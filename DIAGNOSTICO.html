<script>
console.log('🔍 INICIANDO DIAGNÓSTICO SUPABASE...\n');

const SUPABASE_URL = 'https://egtfxbelgeiyvpktosjs.supabase.co';
const SUPABASE_KEY = 'b_publishable_Rgm6BrWhvNEiKimoEFz0hg_jLQeYZm6';

async function testSupabase() {
  console.log('📋 TESTE 1: Conectar ao Supabase');
  console.log('URL:', SUPABASE_URL);
  console.log('KEY:', SUPABASE_KEY.substring(0, 20) + '***\n');

  // Teste 1: Verificar se consegue acessar a API
  try {
    const response = await fetch(`${SUPABASE_URL}/rest/v1/`, {
      headers: {
        'apikey': SUPABASE_KEY,
        'Authorization': `Bearer ${SUPABASE_KEY}`,
      }
    });

  } catch (e) {
    console.error('❌ Erro ao conectar:', e.message);
    return;
  }

  // Teste 2: Verificar tabela "photos"
  console.log('\n📋 TESTE 2: Verificar tabela "photos"');
  try {
    const response = await fetch(`${SUPABASE_URL}/rest/v1/photos?limit=1`, {
      headers: {
        'apikey': SUPABASE_KEY,
        'Authorization': `Bearer ${SUPABASE_KEY}`,
      }
    });
    if (response.ok) {
      const data = await response.json();
      console.log('✅ Tabela exists. Registros:', data.length);
    } else {
      console.error('❌ Erro:', response.status, await response.text());
    }
  } catch (e) {
    console.error('❌ Erro:', e.message);
  }

  // Teste 3: Verificar tabela "messages"
  console.log('\n📋 TESTE 3: Verificar tabela "messages"');
  try {
    const response = await fetch(`${SUPABASE_URL}/rest/v1/messages?limit=1`, {
      headers: {
        'apikey': SUPABASE_KEY,
        'Authorization': `Bearer ${SUPABASE_KEY}`,
      }
    });
    if (response.ok) {
      const data = await response.json();
      console.log('✅ Tabela exists. Registros:', data.length);
    } else {
      console.error('❌ Erro:', response.status, await response.text());
    }
  } catch (e) {
    console.error('❌ Erro:', e.message);
  }

  // Teste 4: Verificar Storage Bucket
  console.log('\n📋 TESTE 4: Verificar Storage Bucket');
  try {
    const response = await fetch(`${SUPABASE_URL}/storage/v1/bucket/expert-marriage-day`, {
      headers: {
        'apikey': SUPABASE_KEY,
        'Authorization': `Bearer ${SUPABASE_KEY}`,
      }
    });
    if (response.ok) {
      const data = await response.json();
      console.log('✅ Bucket exists:', data.name);
      console.log('   Public:', data.public);
    } else {
      console.error('❌ Erro:', response.status, await response.text());
    }
  } catch (e) {
    console.error('❌ Erro:', e.message);
  }

  // Teste 5: Tentar INSERT na tabela messages
  console.log('\n📋 TESTE 5: Tentar inserir mensagem de teste');
  try {
    const response = await fetch(`${SUPABASE_URL}/rest/v1/messages`, {
      method: 'POST',
      headers: {
        'apikey': SUPABASE_KEY,
        'Authorization': `Bearer ${SUPABASE_KEY}`,
        'Content-Type': 'application/json',
      },
      body: JSON.stringify({
        name: 'Teste Diagnóstico',
        message: 'Mensagem de teste para verificar se está funcionando'
      })
    });
    if (response.ok) {
      const data = await response.json();
      console.log('✅ Mensagem inserida com sucesso!');
      console.log('   ID:', data[0].id);
    } else {
      const error = await response.text();
      console.error('❌ Erro:', response.status);
      console.error('   Mensagem:', error);
    }
  } catch (e) {
    console.error('❌ Erro:', e.message);
  }

  console.log('\n✅ DIAGNÓSTICO COMPLETO!');

testSupabase();
</script>
